<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineMatch – Movie Recommender</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── Variables ── */
    :root {
      --bg:        #0a0a12;
      --surface:   #12121f;
      --surface2:  #1a1a2e;
      --border:    #ffffff0f;
      --border-hover: #ffffff1a;
      --red:       #e50914;
      --red-dim:   #e5091422;
      --red-glow:  #e5091440;
      --text:      #f0f0f0;
      --muted:     #666680;
      --muted2:    #3a3a55;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 80px;
      /* subtle film-grain texture */
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, #e5091412 0%, transparent 70%);
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 52px; }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5rem);
      letter-spacing: 4px;
      line-height: 1;
      color: var(--text);
    }
    .logo span {
      color: var(--red);
      text-shadow: 0 0 40px var(--red-glow);
    }

    .tagline {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ── Divider ── */
    .divider {
      width: 40px;
      height: 2px;
      background: var(--red);
      margin: 16px auto 0;
      border-radius: 2px;
    }

    /* ── Search Area ── */
    .search-area {
      width: 100%;
      max-width: 580px;
    }

    .input-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 10px;
      display: block;
    }

    .search-wrapper { position: relative; }

    #search {
      width: 100%;
      padding: 16px 20px;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #search::placeholder { color: var(--muted2); }
    #search:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px var(--red-dim);
    }

    /* ── Dropdown ── */
    #dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      box-shadow: 0 20px 60px #00000060;
    }
    #dropdown::-webkit-scrollbar { width: 4px; }
    #dropdown::-webkit-scrollbar-track { background: transparent; }
    #dropdown::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

    .drop-item {
      padding: 12px 20px;
      cursor: pointer;
      font-size: 0.92rem;
      color: var(--text);
      transition: background 0.15s, color 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .drop-item:last-child { border-bottom: none; }
    .drop-item:hover { background: var(--red-dim); color: var(--red); }

    /* ── Button ── */
    #recommend-btn {
      margin-top: 12px;
      width: 100%;
      padding: 16px;
      background: var(--red);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 3px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px var(--red-glow);
    }
    #recommend-btn:hover:not(:disabled) {
      background: #ff1a27;
      box-shadow: 0 6px 30px var(--red-glow);
    }
    #recommend-btn:active:not(:disabled) { transform: scale(0.98); }
    #recommend-btn:disabled {
      background: var(--surface2);
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ── Loader ── */
    .loader {
      display: none;
      margin: 40px auto;
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    #error {
      margin-top: 12px;
      color: var(--red);
      font-size: 0.85rem;
      display: none;
      text-align: center;
    }

    /* ── Results ── */
    #results {
      margin-top: 52px;
      width: 100%;
      max-width: 580px;
    }

    .result-heading {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .result-heading strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── Confidence Warning ── */
    .confidence-warning {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--surface);
      border: 1px solid #e5091430;
      border-left: 3px solid var(--red);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 20px;
      animation: fadeUp 0.3s ease both;
    }
    .confidence-warning .warn-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .confidence-warning .warn-text { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
    .confidence-warning .warn-text strong { color: #e0a0a0; font-weight: 500; }

    /* ── Cards ── */
    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 8px;
      cursor: default;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      animation: fadeUp 0.35s ease both;
    }
    .card:hover {
      border-color: var(--border-hover);
      background: var(--surface2);
      transform: translateX(4px);
    }

    /* staggered animation delays */
    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.10s; }
    .card:nth-child(4) { animation-delay: 0.15s; }
    .card:nth-child(5) { animation-delay: 0.20s; }
    .card:nth-child(6) { animation-delay: 0.25s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      color: var(--muted2);
      width: 36px;
      flex-shrink: 0;
      line-height: 1;
    }

    .card-info { flex: 1; min-width: 0; }
    .card-title {
      font-size: 0.97rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-score {
      flex-shrink: 0;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }
    /* Score colour coding */
    .score-high   { background: #00ff8822; color: #00cc66; }
    .score-medium { background: #ffaa0022; color: #ffaa00; }
    .score-low    { background: var(--red-dim); color: var(--red); }

  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <h1 class="logo">Cine<span>Match</span></h1>
    <div class="divider"></div>
    <p class="tagline">Type a movie you love — we'll find what's next</p>
  </header>

  <!-- Search -->
  <div class="search-area">
    <label class="input-label" for="search">Movie Title</label>
    <div class="search-wrapper">
      <input id="search" type="text" placeholder="e.g. Inception, Avatar, The Dark Knight…" autocomplete="off"/>
      <div id="dropdown"></div>
    </div>

    <button id="recommend-btn" disabled>Find Similar Movies</button>
    <p id="error">Movie not found. Please select a title from the list.</p>
  </div>

  <div class="loader" id="loader"></div>

  <!-- Results -->
  <div id="results"></div>

  <script>
    const ALL_MOVIES  = {{ movies | tojson }};
    let selectedMovie = '';

    const searchEl  = document.getElementById('search');
    const dropdown  = document.getElementById('dropdown');
    const btn       = document.getElementById('recommend-btn');
    const resultsEl = document.getElementById('results');
    const errorEl   = document.getElementById('error');
    const loader    = document.getElementById('loader');

    /* ── Autocomplete ── */
    searchEl.addEventListener('input', () => {
      const q = searchEl.value.trim().toLowerCase();
      dropdown.innerHTML = '';
      selectedMovie = '';
      btn.disabled  = true;
      errorEl.style.display = 'none';

      if (q.length < 2) { dropdown.style.display = 'none'; return; }

      const matches = ALL_MOVIES
        .filter(m => m.toLowerCase().includes(q))
        .slice(0, 8);

      if (!matches.length) { dropdown.style.display = 'none'; return; }

      matches.forEach(title => {
        const div = document.createElement('div');
        div.className   = 'drop-item';
        div.textContent = title;
        div.addEventListener('click', () => {
          searchEl.value = title;
          selectedMovie  = title;
          btn.disabled   = false;
          dropdown.style.display = 'none';
          errorEl.style.display  = 'none';
        });
        dropdown.appendChild(div);
      });
      dropdown.style.display = 'block';
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrapper')) dropdown.style.display = 'none';
    });

    /* ── Score helpers ── */
    function scoreClass(score) {
      if (score >= 0.40) return 'score-high';
      if (score >= 0.25) return 'score-medium';
      return 'score-low';
    }
    function scorePct(score) { return (score * 100).toFixed(0) + '%'; }

    /* ── Recommend ── */
    btn.addEventListener('click', async () => {
      if (!selectedMovie) return;

      resultsEl.innerHTML    = '';
      errorEl.style.display  = 'none';
      loader.style.display   = 'block';
      btn.disabled           = true;

      try {
        const res  = await fetch('/recommend', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ title: selectedMovie })
        });
        const data = await res.json();
        loader.style.display = 'none';

        if (data.error) {
          errorEl.textContent   = 'Movie not found in our database.';
          errorEl.style.display = 'block';
          btn.disabled = false;
          return;
        }

        const maxScore = data.recommendations[0].score;

        // Heading
        resultsEl.innerHTML = `
          <p class="result-heading">
            Because you liked <strong>"${selectedMovie}"</strong>
          </p>`;

        // Low-confidence warning
        if (maxScore < 0.25) {
          resultsEl.innerHTML += `
            <div class="confidence-warning">
              <span class="warn-icon">⚠️</span>
              <span class="warn-text">
                <strong>Limited metadata available</strong> for this title —
                recommendations may be less accurate than usual.
                Scores below 25% indicate a sparse data match.
              </span>
            </div>`;
        }

        // Cards
        data.recommendations.forEach((movie, i) => {
          const cls = scoreClass(movie.score);
          resultsEl.innerHTML += `
            <div class="card">
              <span class="card-rank">${String(i + 1).padStart(2, '0')}</span>
              <div class="card-info">
                <div class="card-title">${movie.title}</div>
              </div>
              <span class="card-score ${cls}">${scorePct(movie.score)} match</span>
            </div>`;
        });

      } catch {
        loader.style.display  = 'none';
        errorEl.textContent   = 'Something went wrong. Is the Flask server running?';
        errorEl.style.display = 'block';
      }

      btn.disabled = false;
    });

    /* ── Enter key support ── */
    searchEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !btn.disabled) btn.click();
    });
  </script>
</body>
</html>
